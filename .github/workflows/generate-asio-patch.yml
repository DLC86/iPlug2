name: Generate patched dialog

on:
  push:
    branches: [fix-asio-duplex-device-info]

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: python3 .github/scripts/apply_asio_duplex_device_fix.py
      - uses: actions/upload-artifact@v7
        with:
          name: patched-dialog
          path: IPlug/APP/IPlugAPP_dialog.cpp
